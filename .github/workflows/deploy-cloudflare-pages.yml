name: Validar e publicar sites

on:
  push:
    branches:
      - main
    paths:
      - "main/**"
      - "hefesto/**"
      - "poseidon/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"

  pull_request:
    branches:
      - main
    paths:
      - "main/**"
      - "hefesto/**"
      - "poseidon/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"

  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  validate:
    name: Validar sites
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v7

      - name: Verificar arquivos HTML
        shell: bash
        run: |
          set -euo pipefail

          for site in main hefesto poseidon; do
            file="$site/index.html"

            echo "Validando $file"

            if [ ! -s "$file" ]; then
              echo "::error file=$file::Arquivo ausente ou vazio."
              exit 1
            fi

            grep -qi '<!doctype html' "$file" || {
              echo "::error file=$file::DOCTYPE não encontrado."
              exit 1
            }

            grep -qi '<html' "$file" || {
              echo "::error file=$file::Tag html não encontrada."
              exit 1
            }

            grep -qi '<head' "$file" || {
              echo "::error file=$file::Tag head não encontrada."
              exit 1
            }

            grep -qi '<title' "$file" || {
              echo "::error file=$file::Tag title não encontrada."
              exit 1
            }

            grep -qi '<body' "$file" || {
              echo "::error file=$file::Tag body não encontrada."
              exit 1
            }
          done

      - name: Procurar possíveis segredos
        shell: bash
        run: |
          set -euo pipefail

          if grep -RInE \
            'BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY|CLOUDFLARE_API_TOKEN=|GITHUB_TOKEN=|PRIVATE_KEY=' \
            main hefesto poseidon README.md DEPLOY_CLOUDFLARE.md 2>/dev/null
          then
            echo "::error::Possível segredo encontrado no repositório."
            exit 1
          fi

          echo "Nenhum padrão evidente de segredo foi encontrado."

      - name: Verificar links principais
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'https://portfolio.wicolly.com.br' main/index.html
          grep -q 'https://hefesto.wicolly.com.br' main/index.html
          grep -q 'https://poseidon.wicolly.com.br' main/index.html
          grep -q 'https://wicolly.com.br' hefesto/index.html
          grep -q 'https://wicolly.com.br' poseidon/index.html

  deploy:
    name: Publicar ${{ matrix.project }}
    needs:
      - validate

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - directory: main
            project: wicolly-main

          - directory: hefesto
            project: wicolly-hefesto

          - directory: poseidon
            project: wicolly-poseidon

    concurrency:
      group: cloudflare-${{ matrix.project }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v7

      - name: Publicar no Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: >
            pages deploy ${{ matrix.directory }}
            --project-name=${{ matrix.project }}
            --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Mostrar endereço publicado
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "Projeto: ${{ matrix.project }}"
          echo "URL: $DEPLOYMENT_URL"

