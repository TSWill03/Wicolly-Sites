name: Validate and deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-wicolly-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Validate, build, lint and check links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Run complete verification
        run: npm test

      - name: Check build output
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/_redirects
          test -f dist/portfolio/index.html
          test -d dist/portfolio/assets
          test -f dist/portfolio/curriculo.html
          test -f dist/portfolio/curriculo.pdf
          test -f dist/hefesto/index.html
          test -f dist/poseidon/index.html

  deploy:
    name: Deploy wicolly-site
    needs: quality
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Build unified site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy dist --project-name=wicolly-site --branch=main
