name: Validate and deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-wicolly-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Validate, build, lint and check links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Run complete verification
        run: npm test

      - name: Check build output
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/_redirects
          test -f dist/portfolio/index.html
          test -d dist/portfolio/assets
          test -f dist/portfolio/curriculo.html
          test -f dist/portfolio/curriculo.pdf
          test -f dist/hefesto/index.html
          test -f dist/poseidon/index.html

  deploy:
    name: Deploy wicolly-site
    needs: quality
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Build unified site
        run: npm run build

      - name: Validate Cloudflare secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Repository secret CLOUDFLARE_API_TOKEN is missing or empty."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Repository secret CLOUDFLARE_ACCOUNT_ID is missing or empty."
            exit 1
          fi

          echo "Cloudflare secrets are available to the workflow."

      - name: Verify Cloudflare Pages project
        shell: bash
        run: |
          set -euo pipefail

          status=$(curl --silent --show-error \
            --output cloudflare-project-response.json \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/wicolly-site")

          if [ "$status" != "200" ]; then
            echo "::error::Cloudflare could not access the Pages project 'wicolly-site' in the configured account. HTTP status: $status"
            cat cloudflare-project-response.json
            exit 1
          fi

          node --input-type=module <<'NODE'
          import fs from 'node:fs'

          const response = JSON.parse(fs.readFileSync('cloudflare-project-response.json', 'utf8'))
          if (!response.success || response.result?.name !== 'wicolly-site') {
            console.error('::error::The Cloudflare token or account ID cannot access the Pages project wicolly-site.')
            console.error(JSON.stringify(response.errors ?? response.messages ?? [], null, 2))
            process.exit(1)
          }

          console.log(`Cloudflare Pages project confirmed: ${response.result.name}`)
          NODE

          rm -f cloudflare-project-response.json

      - name: Deploy to Cloudflare Pages
        shell: bash
        run: |
          set -euo pipefail
          CLOUDFLARE_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}" \
          CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN}" \
          npx --yes wrangler@4 pages deploy dist \
            --project-name=wicolly-site \
            --branch=main
