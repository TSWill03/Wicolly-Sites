name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-wicolly-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy wicolly-site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Validate source
        run: npm run validate

      - name: Build unified site
        run: npm run build

      - name: Check build output
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/_redirects
          test -f dist/portfolio/index.html
          test -d dist/portfolio/assets
          test -f dist/hefesto/index.html
          test -f dist/poseidon/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy dist --project-name=wicolly-site --branch=main
